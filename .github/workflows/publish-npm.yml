name: Publish to npmjs

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Publish create-agileclawteam
        run: npm publish
        working-directory: create-agileclawteam
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
